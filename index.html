<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My first Map Libre Map</title>
    <!-- MapLibre GL JS: Die JavaScript-Bibliothek für interaktive Karten -->
    <script src="https://unpkg.com/maplibre-gl@^5.13.0/dist/maplibre-gl.js"></script>
    <!-- MapLibre GL JS CSS: Die Stylesheet für die Karte und Navigationselemente -->
    <link href="https://unpkg.com/maplibre-gl@^5.13.0/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        /* Entfernen des Browser Standardabstands */
        body {
            margin: 0;
        }

        /* Die Karte nimmt die gesamte Breite und Höhe ein */
        #map {
            width: 100%;
            height: 100dvh;
        }
    </style>
</head>

<body>
    <div id="map"></div>
    <div id="zoom-level"
        style="position: absolute; top: 10px; left: 10px; background: white; padding: 5px; border-radius: 3px; font-family: sans-serif; box-shadow: 0 0 1em rgba(0,0,0,0.3);">
    </div>

    <script>
        // Koordinaten von Dresden: [Längengrad, Breitengrad]
        const dresden = [13.737359, 51.050407];
        const rathen = [14.079849, 50.957274];
        const map = new maplibregl.Map({
            container: 'map',
            style: 'https://tiles.openfreemap.org/styles/bright', // oder alternativ ein lokale .json Datei  
            zoom: 15,
            // Verweis auf die Koordinaten
            center: rathen,
            pitch: 45,
            // Deaktivieren des Doppelklick-Zooms
            doubleClickZoom: false,
        });

        // Der folgende Code wird ausgeführt, sobald die Karte vollständig geladen ist
        map.on('load', () => {

            // NavigationControl zur Karte hinzugefügen
            const nav = new maplibregl.NavigationControl();
            map.addControl(nav);

            // Speichern des Zoom-Level-Elements
            // Dieses Element ist optional, es wird nur zum debuggen verwendet, um das aktuelle Zoom-Level anzuzeigen.
            const zoomDisplay = document.getElementById('zoom-level');
            // Setzt das zoom level direkt nachdem die Karte geladen ist
            zoomDisplay.textContent = map.getZoom().toFixed(2);
            // Aktualisiert den Inhalt des Zoom-Level-Elements
            map.on('zoom', () => {
                zoomDisplay.textContent = map.getZoom().toFixed(2);
            });

            // URL der OGC API, die die Daten der Apotheken in Dresden bereitstellt
            const farmacyUrl = "https://kommisdd.dresden.de/net4/public/ogcapi/collections/L458/items";
            // Remote GeoJSON Quelle hinzufügen
            map.addSource("farmacies", {
                "type": "geojson",
                "data": farmacyUrl
            });

            // sprite für die Icons hinzufügen
            map.addSprite("phosphor", "https://latidudemaps.github.io/basemap-assets/sprites/phosphor/phosphor-sdf/fill")

            map.addLayer({
                "id": "farmacies-layer-backdrop",
                "source": "farmacies",
                "type": "circle",
                "paint": {
                    "circle-radius": 8,
                    "circle-color": "rgba(0, 150, 0, 1)"
                }
            });

            map.addLayer({
                "id": "farmacies-layer",
                "source": "farmacies",
                "type": "symbol",
                "layout": {
                    "icon-image": "phosphor:first-aid-fill",
                    "icon-size": 0.5,
                    "icon-allow-overlap": true
                },
                "paint": {
                    "icon-color": "white",
                }
            });

            // lokale GeoJSON Quelle hinzufügen
            map.addSource("pools-dresden", {
                "type": "geojson",
                "data": "data/freibaeder-dresden.geojson"
            });

            map.addLayer({
                "id": "pools-dresden-layer",
                "source": "pools-dresden",
                "type": "circle",
                "paint": {
                    "circle-radius": 4,
                    "circle-color": "rgba(0, 0, 255, 1)"
                }
            });

            // lokale GeoJSON Quelle hinzufügen
            map.addSource("dkk-venues", {
                "type": "geojson",
                "data": "data/dkk-venues.geojson"
            });

            map.addLayer({
                "id": "dkk-venues-layer",
                "source": "dkk-venues",
                "type": "fill",
                "paint": {
                    "fill-color": "rgb(100, 200, 100)",
                }
            });
            map.addLayer({
                "id": "dkk-venues-layer-outline",
                "source": "dkk-venues",
                "type": "line",
                "paint": {
                    "line-color": "rgb(50, 100, 50)",
                    "line-width": 2
                }
            });

            // Terrain Quelle hinzufügen
            map.addSource("terrain", {
                type: 'raster-dem',
                tiles: [
                    'https://s3.amazonaws.com/elevation-tiles-prod/terrarium/{z}/{x}/{y}.png'
                ],
                tileSize: 256,
                encoding: 'terrarium',
                maxzoom: 15
            })

            // Terrain mit Exaggeration hinzufügen
            // map.setTerrain({ source: "terrain", exaggeration: 2 });

            // Terrain Control hinzufügen, um das Terrain zu aktivieren/deaktivieren
            map.addControl(new maplibregl.TerrainControl({
                source: "terrain",
                exaggeration: 2,
            }));

            // hillshade layer hinzufügen, um die Höhenunterschiede besser sichtbar zu machen
            map.addLayer({
                id: 'hillshade',
                type: 'hillshade',
                source: 'terrain',
                paint: {
                    'hillshade-shadow-color': 'rgba(0, 0, 0, 0.5)',
                    'hillshade-highlight-color': 'rgba(255, 255, 255, 0.5)',
                }
            }, 'poi_r20'); // beforeId: hillshade layer unter den dkk-venues Layer legen


            // Einen Marker manuell hinzufügen
            const marker = new maplibregl.Marker({ color: "green" })
                .setLngLat(rathen)
                .addTo(map)
                .setPopup(new maplibregl.Popup()
                    .setText("Ich war hier!"));

            // Funktion definieren die ausgeführt wird, wenn auf einen POI Layer geklickt wird
            map.on('click', 'poi_r1', (e) => {
                // Das erste Feature aus dem Event-Objekt extrahieren
                const feature = e.features.at(0);
                // Koordinaten des Features extrahieren
                const { coordinates } = feature.geometry;
                // Koordinaten und relevante Eigenschaften des Features extrahieren
                const { name, class: featureClass } = feature.properties;
                // Die Karte zu den Koordinaten des Features bewegen
                map.flyTo({ center: coordinates });

                // Popoup erstellen und zur Karte hinzufügen
                new maplibregl.Popup()
                    .setLngLat(coordinates)
                    .setHTML(`<strong>${name}</strong><br/><span>${featureClass}</span>`)
                    .addTo(map);
            });

            // Mouse Cursor ändern, wenn er über einem POI Layer schwebt
            // Cursor zu 'pointer' ändern wenn Maus ein Feature des poi_r1 Layers "betritt"
            map.on('mouseenter', 'poi_r1', () => {
                map.getCanvas().style.cursor = 'pointer';
            });

            // Cursor zurücksetzen, wenn Maus den POI Layer verlässt
            map.on('mouseleave', 'poi_r1', () => {
                map.getCanvas().style.cursor = '';
            });
        });
    </script>
</body>

</html>
