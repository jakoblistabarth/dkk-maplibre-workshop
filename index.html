<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My first Map Libre Map</title>
    <!-- MapLibre GL JS: Die JavaScript-Bibliothek für interaktive Karten -->
    <script src="https://unpkg.com/maplibre-gl@^5.13.0/dist/maplibre-gl.js"></script>
    <!-- MapLibre GL JS CSS: Die Stylesheet für die Karte und Navigationselemente -->
    <link href="https://unpkg.com/maplibre-gl@^5.13.0/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        /* Entfernen des Browser Standardabstands */
        body {
            margin: 0;
        }

        /* Die Karte nimmt die gesamte Breite und Höhe ein */
        #map {
            width: 100%;
            height: 100dvh;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/pmtiles@4.4.1/dist/pmtiles.min.js"></script>

</head>

<body>
    <div id="map"></div>
    <div id="zoom-level"
        style="position: absolute; top: 10px; left: 10px; background: white; padding: 5px; border-radius: 3px;"></div>

    <script>
        const dresden = [13.737359, 51.050407];
        const map = new maplibregl.Map({
            container: 'map',
            style: 'https://tiles.openfreemap.org/styles/positron',
            zoom: 12,
            center: dresden
        });

        // no data loading required - just use the OGC API endpoint as GeoJSON source
        // async data loading is handled internally by MapLibre GL JS
        // only necessary if data is needed outside of the map context or needs preprocessing

        // possibe extensions:
        // - tweak basemap style (maputnik) 
        // - refine point layer symbolization
        // - add polygon and line layer
        // - limit map zoom
        // - add frame: title, legend?

        const farmacyUrl = "https://kommisdd.dresden.de/net4/public/ogcapi/collections/L458/items";

        map.on('load', () => {
            const marker = new maplibregl.Marker({ color: "red" }).setLngLat(dresden).addTo(map);

            const nav = new maplibregl.NavigationControl();
            map.addControl(nav);

            // Target the HTML element
            const zoomDisplay = document.getElementById('zoom-level');

            // Update the display whenever the user zooms
            map.on('zoom', () => {
                zoomDisplay.textContent = map.getZoom().toFixed(2);
            });

            // Initialize the zoom level immediately on load
            zoomDisplay.textContent = map.getZoom().toFixed(2);

            const protocol = new pmtiles.Protocol();
            maplibregl.addProtocol("pmtiles", protocol.tile);
            console.log({ protocol })

            map.addSource("coffee-shops", {
                "type": "geojson",
                "data": "germany-coffee-shops.geojson"
            });

            map.addSource("coffee-shops-pmtiles", {
                "type": "vector",
                "url": "pmtiles://http://localhost:5500/germany-coffee-shops.pmtiles"
            })

            map.addSource("farmacies", {
                "type": "geojson",
                "data": farmacyUrl
            });

            map.addSprite("phosphor", "https://latidudemaps.github.io/basemap-assets/sprites/phosphor/phosphor-sdf/fill")

            map.addLayer({
                "id": "farmacies-layer-backdrop",
                "source": "farmacies",
                "type": "circle",
                "paint": {
                    "circle-radius": 8,
                    "circle-color": "rgba(0, 150, 0, 1)"
                }
            });

            map.addLayer({
                "id": "farmacies-layer",
                "source": "farmacies",
                "type": "symbol",
                "layout": {
                    "icon-image": "phosphor:first-aid-fill",
                    "icon-size": 0.5,
                    "icon-allow-overlap": true
                },
                "paint": {
                    "icon-color": "white",
                }
            });

            map.addLayer({
                "id": "coffee-shop-layer",
                "type": "circle",
                "source": "coffee-shops",
                "paint": {
                    "circle-radius": 5,
                    "circle-color": "blue"
                }
            });

            map.addLayer({
                "id": "coffee-shop-layer-vector",
                "type": "circle",
                "source": "coffee-shops-pmtiles",
                "source-layer": "coffee-shops",
                "paint": {
                    "circle-radius": 3,
                    "circle-color": "orange"
                }
            });


            map.on('click', 'farmacies-layer', (e) => {
                const feature = e.features.at(0);
                const { coordinates } = feature.geometry;
                const { einrichtung: name, strasse: street } = feature.properties;
                map.flyTo({ center: coordinates, zoom: 13 });

                new maplibregl.Popup()
                    .setLngLat(coordinates)
                    .setHTML(`<strong>${name}</strong><br/>${street}`)
                    .addTo(map);
            });
        });

        (async () => {
            const resp = await fetch(farmacyUrl);
            const data = await resp.json();
            console.table(data.features.map((f) => f.properties));
        })()

    </script>
</body>

</html>
