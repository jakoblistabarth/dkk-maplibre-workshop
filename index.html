<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My first Map Libre Map</title>
    <!-- MapLibre GL JS: Die JavaScript-Bibliothek für interaktive Karten -->
    <script src="https://unpkg.com/maplibre-gl@^5.13.0/dist/maplibre-gl.js"></script>
    <!-- MapLibre GL JS CSS: Die Stylesheet für die Karte und Navigationselemente -->
    <link href="https://unpkg.com/maplibre-gl@^5.13.0/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        /* Entfernen des Browser Standardabstands */
        body {
            margin: 0;
        }

        /* Die Karte nimmt die gesamte Breite und Höhe ein */
        #map {
            width: 100%;
            height: 100dvh;
        }
    </style>

    <!-- Einbindung des pmtiles-Protokolls -->
    <script src="https://cdn.jsdelivr.net/npm/pmtiles@4.4.1/dist/pmtiles.min.js"></script>

</head>

<body>
    <div id="map"></div>
    <div id="zoom-level"
        style="position: absolute; top: 10px; left: 10px; background: white; padding: 5px; border-radius: 3px; font-family: sans-serif; box-shadow: 0 0 1em rgba(0,0,0,0.3);">
    </div>

    <script>
        // Koordinaten von Dresden: [Längengrad, Breitengrad]
        const dresden = [13.737359, 51.050407];
        const rathen = [14.079849, 50.957274];
        const map = new maplibregl.Map({
            container: 'map',
            style: 'https://tiles.openfreemap.org/styles/positron', // oder alternativ ein lokale .json Datei  
            zoom: 12,
            // Verweis auf die Koordinaten
            center: rathen,
            // Deaktivieren des Doppelklick-Zooms
            doubleClickZoom: false,
            terrain: {
                source: "terrain",
            }
        });

        // URL der OGC API, die die Daten der Apotheken in Dresden bereitstellt
        const farmacyUrl = "https://kommisdd.dresden.de/net4/public/ogcapi/collections/L458/items";

        // Der folgende Code wird ausgeführt, sobald die Karte vollständig geladen ist
        map.on('load', () => {

            // NavigationControl zur Karte hinzugefügen
            const nav = new maplibregl.NavigationControl();
            map.addControl(nav);

            // Ein roter Marker an den Koordinaten von Dresden hinzugefügen
            const marker = new maplibregl.Marker({ color: "red" }).setLngLat(dresden).addTo(map);

            // Speichern des Zoom-Level-Elements
            const zoomDisplay = document.getElementById('zoom-level');
            // Setzt das zoom level direkt nachdem die Karte geladen ist
            zoomDisplay.textContent = map.getZoom().toFixed(2);
            // Aktualisiert den Inhalt des Zoom-Level-Elements
            map.on('zoom', () => {
                zoomDisplay.textContent = map.getZoom().toFixed(2);
            });

            const protocol = new pmtiles.Protocol();
            maplibregl.addProtocol("pmtiles", protocol.tile);
            console.log({ protocol })


            // TODO: Remove, only for debugging
            map.addSource("coffee-shops", {
                "type": "geojson",
                "data": "germany-coffee-shops.geojson"
            });

            map.addSource("terrain", {
                type: 'raster-dem',
                tiles: [
                    'https://s3.amazonaws.com/elevation-tiles-prod/terrarium/{z}/{x}/{y}.png'
                ],
                tileSize: 256,
                encoding: 'terrarium',
                maxzoom: 15
            })

            map.addControl(new maplibregl.TerrainControl({
                source: "terrain",
                exaggeration: 2,
            }));

            map.addLayer({
                id: 'hillshade',
                type: 'hillshade',
                source: 'terrain',
                paint: {
                    'hillshade-shadow-color': 'rgba(0, 0, 0, 0.5)',
                    'hillshade-highlight-color': 'rgba(255, 255, 255, 0.5)',
                }
            });

            map.addSource("dkk-demo-tiles", {
                "type": "vector",
                "url": "pmtiles://http://localhost:5500/dkk-demo.pmtiles"
            })

            map.addSource("farmacies", {
                "type": "geojson",
                "data": farmacyUrl
            });

            map.addSprite("phosphor", "https://latidudemaps.github.io/basemap-assets/sprites/phosphor/phosphor-sdf/fill")

            map.addLayer({
                "id": "farmacies-layer-backdrop",
                "source": "farmacies",
                "type": "circle",
                "paint": {
                    "circle-radius": 8,
                    "circle-color": "rgba(0, 150, 0, 1)"
                }
            });

            map.addLayer({
                "id": "farmacies-layer",
                "source": "farmacies",
                "type": "symbol",
                "layout": {
                    "icon-image": "phosphor:first-aid-fill",
                    "icon-size": 0.5,
                    "icon-allow-overlap": true
                },
                "paint": {
                    "icon-color": "white",
                }
            });

            map.addLayer({
                "id": "coffee-shop-layer",
                "type": "circle",
                "source": "coffee-shops",
                "paint": {
                    "circle-radius": 5,
                    "circle-color": "blue"
                }
            });

            map.addLayer({
                "id": "coffee-shop-layer-vector",
                "type": "circle",
                "source": "dkk-demo-tiles",
                "source-layer": "coffee-shops",
                "paint": {
                    "circle-radius": 3,
                    "circle-color": "orange"
                }
            });


            map.on('click', 'farmacies-layer', (e) => {
                const feature = e.features.at(0);
                const { coordinates } = feature.geometry;
                const { einrichtung: name, strasse: street } = feature.properties;
                map.flyTo({ center: coordinates, zoom: 13 });

                new maplibregl.Popup()
                    .setLngLat(coordinates)
                    .setHTML(`<strong>${name}</strong><br/>${street}`)
                    .addTo(map);
            });
        });

        // (async () => {
        //     const resp = await fetch(farmacyUrl);
        //     const data = await resp.json();
        //     console.table(data.features.map((f) => f.properties));
        // })()

    </script>
</body>

</html>
